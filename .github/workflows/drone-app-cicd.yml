# ============================================================
#  DockOps — DroneFleet App CI/CD Pipeline
#  Part of: github.com/spillala/dockops-cicd
#
#  Pipeline stages:
#   1. lint        — code quality checks
#   2. test        — unit + integration tests
#   3. build       — Docker multi-stage build (tests run inside)
#   4. push        — push image to GitHub Container Registry
#   5. deploy      — rolling update to K8s cluster
#   6. smoke-test  — post-deploy health verification
#   7. rollback    — automatic rollback if smoke test fails
#   8. notify      — Slack notification with result
# ============================================================

name: DroneFleet App CI/CD

on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "app/dronefleet/**"
      - "k8s/**"
      - "Dockerfile"
      - ".github/workflows/drone-app-cicd.yml"
  pull_request:
    branches:
      - main
    paths:
      - "app/dronefleet/**"
      - "Dockerfile"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dronefleet
  K8S_NAMESPACE: dronefleet
  DEPLOYMENT_NAME: dronefleet

jobs:

  # ── 1. LINT ─────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/dronefleet/src/requirements.txt

      - name: Install linting tools
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/dronefleet/src/ --output-format=github

      - name: Validate K8s manifests with kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          kubectl apply --dry-run=client -f k8s/base/deployment.yaml

  # ── 2. TEST ─────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/dronefleet/src/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/dronefleet/src/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        run: |
          pytest app/dronefleet/tests/ \
            -v \
            --tb=short \
            --cov=app/dronefleet/src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── 3 & 4. BUILD + PUSH ─────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    # Only push on main branch — PRs only build to verify
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (and push on main)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true              # Software Bill of Materials — good practice

      - name: Output image summary
        run: |
          echo "### Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA tag | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── 5. DEPLOY ───────────────────────────────────────────────
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://dronefleet.dockops.local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.30.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Ensure namespace exists
        run: |
          kubectl get namespace ${{ env.K8S_NAMESPACE }} || \
          kubectl create namespace ${{ env.K8S_NAMESPACE }}

      - name: Record current image (for rollback)
        id: current-image
        run: |
          CURRENT=$(kubectl get deployment ${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
          echo "image=${CURRENT}" >> $GITHUB_OUTPUT
          echo "Previous image: ${CURRENT}"

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/base/deployment.yaml \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Update image to new SHA
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            dronefleet=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=120s

      - name: Deployment summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ env.K8S_NAMESPACE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment | \`${{ env.DEPLOYMENT_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New image | \`${{ needs.build-and-push.outputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous image | \`${{ steps.current-image.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── 6. SMOKE TEST ───────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    outputs:
      passed: ${{ steps.smoke.outputs.passed }}
    steps:
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Port-forward and run smoke tests
        id: smoke
        run: |
          # Port-forward in background
          kubectl port-forward \
            svc/dronefleet-svc 18080:80 \
            -n ${{ env.K8S_NAMESPACE }} &
          PF_PID=$!
          sleep 5

          PASS=true

          check() {
            local url=$1
            local expected=$2
            local resp=$(curl -sf "http://localhost:18080${url}" || echo "FAILED")
            if echo "$resp" | grep -q "$expected"; then
              echo "PASS: ${url} contains '${expected}'"
            else
              echo "FAIL: ${url} — expected '${expected}', got: ${resp}"
              PASS=false
            fi
          }

          # Core health checks
          check "/health"        "ok"
          check "/ready"         "ready"

          # Fleet API
          check "/api/v1/fleet"  "drones"

          # Mission API
          check "/api/v1/missions" "missions"

          kill $PF_PID 2>/dev/null || true

          if [ "$PASS" = "true" ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "All smoke tests passed."
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "Smoke tests FAILED."
            exit 1
          fi

  # ── 7. ROLLBACK ─────────────────────────────────────────────
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    # Only runs if smoke test failed
    if: failure() && needs.smoke-test.outputs.passed == 'false'
    steps:
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Rollback deployment
        run: |
          echo "Smoke test failed — initiating rollback..."
          kubectl rollout undo deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=60s
          echo "Rollback complete."

      - name: Rollback summary
        run: |
          echo "### ROLLBACK EXECUTED" >> $GITHUB_STEP_SUMMARY
          echo "Smoke tests failed. Deployment rolled back to previous version." >> $GITHUB_STEP_SUMMARY

  # ── 8. NOTIFY ───────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy, smoke-test]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.smoke-test.result }}" == "success" ]]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "text=Deployment succeeded" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.smoke-test.result }}" == "failure" ]]; then
            echo "emoji=🔴" >> $GITHUB_OUTPUT
            echo "text=Deployment FAILED — rollback initiated" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          else
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "text=Deployment status unknown" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "attachments": [{
                "color": "${{ steps.status.outputs.color }}",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "${{ steps.status.outputs.emoji }} *DockOps — DroneFleet Deploy*\n${{ steps.status.outputs.text }}"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Repo:*\n`${{ github.repository }}`" },
                      { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" },
                      { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`" },
                      { "type": "mrkdwn", "text": "*Image tag:*\n`${{ needs.build-and-push.outputs.image-tag }}`" },
                      { "type": "mrkdwn", "text": "*Triggered by:*\n`${{ github.actor }}`" },
                      { "type": "mrkdwn", "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View details>" }
                    ]
                  }
                ]
              }]
            }'
