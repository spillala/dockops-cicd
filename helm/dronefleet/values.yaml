replicaCount: 2

image:
  repository: ghcr.io/spillala/dronefleet
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: "dronefleet"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

env:
  APP_ENV: production
  APP_PORT: "8080"
  LOG_LEVEL: info
  MAX_FLEET_SIZE: "50"
  TELEMETRY_BUFFER: "100"

# Set via --set or secret injection in CI
databaseUrl: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5

namespace: dronefleet
