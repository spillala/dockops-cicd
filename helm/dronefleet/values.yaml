replicaCount: 2
image:
  repository: ghcr.io/spillala/dronefleet
  # !! THIS FIELD IS MANAGED BY CI !!
  # drone-app-cicd.yml updates this via yq on every successful build.
  # Do not change manually — your change will be overwritten on next deploy.
  tag: "efc684f"
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: ghcr-pull-secret
nameOverride: ""
fullnameOverride: "dronefleet"
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
env:
  APP_ENV: production
  APP_PORT: "8080"
  LOG_LEVEL: info
  MAX_FLEET_SIZE: "50"
  TELEMETRY_BUFFER: "100"
# Set via K8s secret — see k8s/base/deployment.yaml secretKeyRef
databaseUrl: ""
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5
namespace: dronefleet
